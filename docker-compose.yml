name: openvend

services:
  traefik:
    image: traefik:v3.5.3
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "${OPENVEND_HTTP_BIND:-127.0.0.1}:${OPENVEND_HTTP_PORT:-8088}:80"
      - "127.0.0.1:${OPENVEND_TRAEFIK_DASHBOARD_PORT:-18088}:8080"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    networks:
      - edge
      - app
    depends_on:
      web:
        condition: service_started
      authorization-adapter:
        condition: service_healthy
      kratos:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-/auth}
    networks:
      - app
    restart: unless-stopped

  authorization-adapter:
    build:
      context: .
      dockerfile: services/authorization-adapter/Dockerfile
    environment:
      OPENVEND_ENV: ${OPENVEND_ENV:-development}
      AUTHZ_SERVICE_TOKEN_SECRET: ${AUTHZ_SERVICE_TOKEN_SECRET:-replace-with-dev-secret}
      AUTHZ_DEV_AUTH_ENABLED: ${AUTHZ_DEV_AUTH_ENABLED:-false}
      AUTHZ_DEMO_IDENTITY_ID: ${AUTHZ_DEMO_IDENTITY_ID:-dev-admin}
      AUTHZ_DEMO_EMAIL: ${AUTHZ_DEMO_EMAIL:-admin@example.com}
      AUTHZ_DEMO_DISPLAY_NAME: ${AUTHZ_DEMO_DISPLAY_NAME:-OpenVend Admin}
      AUTHZ_DEMO_ROLE: ${AUTHZ_DEMO_ROLE:-owner}
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  kratos-migrate:
    image: oryd/kratos:v1.3.1
    command: migrate sql -e --yes
    environment:
      DSN: ${KRATOS_DSN:-postgres://openvend:openvend-dev-password@postgres:5432/kratos?sslmode=disable}
    volumes:
      - ./infra/kratos/kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ./infra/kratos/identity.schema.d:/etc/config/kratos/identity.schema.d:ro
    networks:
      - app
      - data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kratos:
    image: oryd/kratos:v1.3.1
    command: serve --config /etc/config/kratos/kratos.yml --dev
    environment:
      DSN: ${KRATOS_DSN:-postgres://openvend:openvend-dev-password@postgres:5432/kratos?sslmode=disable}
      SERVE_PUBLIC_BASE_URL: ${KRATOS_PUBLIC_URL:-http://localhost:8088/auth}
      SERVE_ADMIN_BASE_URL: ${KRATOS_ADMIN_URL:-http://kratos:4434}
      SELFSERVICE_DEFAULT_BROWSER_RETURN_URL: ${OPENVEND_PUBLIC_BASE_URL:-http://localhost:8088}
      SELFSERVICE_ERROR_UI_URL: ${KRATOS_ERROR_UI_URL:-http://localhost:8088/auth/error}
      SELFSERVICE_SETTINGS_UI_URL: ${KRATOS_SETTINGS_UI_URL:-http://localhost:8088/settings/account}
      SELFSERVICE_RECOVERY_UI_URL: ${KRATOS_RECOVERY_UI_URL:-http://localhost:8088/auth/recovery}
      SELFSERVICE_VERIFICATION_UI_URL: ${KRATOS_VERIFICATION_UI_URL:-http://localhost:8088/auth/verification}
      SELFSERVICE_LOGIN_UI_URL: ${KRATOS_LOGIN_UI_URL:-http://localhost:8088/auth/login}
      SELFSERVICE_REGISTRATION_UI_URL: ${KRATOS_REGISTRATION_UI_URL:-http://localhost:8088/auth/registration}
      SECRETS_COOKIE_0: ${KRATOS_COOKIE_SECRET:-replace-with-at-least-32-characters}
      SECRETS_CIPHER_0: ${KRATOS_CIPHER_SECRET:-replace-with-32-character-secret}
    volumes:
      - ./infra/kratos/kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ./infra/kratos/identity.schema.d:/etc/config/kratos/identity.schema.d:ro
    networks:
      - app
      - data
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openvend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openvend-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-openvend_admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

networks:
  edge:
    driver: bridge
  app:
    driver: bridge
    internal: true
  data:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  valkey_data:
