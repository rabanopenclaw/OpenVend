name: openvend

services:
  traefik:
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "${OPENVEND_HTTP_BIND:-127.0.0.1}:${OPENVEND_HTTP_PORT:-8088}:80"
      - "${OPENVEND_HTTPS_BIND:-127.0.0.1}:${OPENVEND_HTTPS_PORT:-8443}:443"
      - "127.0.0.1:${OPENVEND_TRAEFIK_DASHBOARD_PORT:-18088}:8080"
    volumes:
      - ./infra/traefik/dynamic.tls.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - ./infra/traefik/certs:/certs:ro
