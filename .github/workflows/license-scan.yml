name: Dependency Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Node dependencies
        run: npm install
      - name: Audit Node dependencies
        run: npm audit --audit-level=high
      - name: Check Node dependency licenses
        run: npm run license:check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend services with audit tools
        run: pip install -e "services/authorization-adapter[dev]" -e "services/contacts[dev]"
      - name: Audit Authorization Adapter dependencies
        run: pip-audit services/authorization-adapter --cache-dir .cache/pip-audit --skip-editable
      - name: Audit Contacts dependencies
        run: pip-audit services/contacts --cache-dir .cache/pip-audit --skip-editable
      - name: Check Python dependency licenses
        run: python3 scripts/check_python_licenses.py
