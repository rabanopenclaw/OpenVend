name: Dependency Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check dependency policy
        run: node scripts/check_dependency_policy.mjs
