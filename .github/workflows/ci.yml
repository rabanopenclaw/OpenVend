name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Authorization Adapter
        run: pip install -e "services/authorization-adapter[dev]"
      - name: Lint Authorization Adapter
        run: ruff check services/authorization-adapter
      - name: Test Authorization Adapter
        run: pytest services/authorization-adapter/tests
      - name: Export OpenAPI
        run: python3 scripts/export_openapi.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Check frontend and client packages
        run: npm run check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install OpenAPI source service
        run: pip install -e "services/authorization-adapter"
      - name: Generate API client
        run: npm run openapi:clients
      - name: Build frontend
        run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Dependency policy check
        run: node scripts/check_dependency_policy.mjs
